name: uptime-monitor

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: uptime-monitor-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file:
      - .env.local
    volumes:
      - ./apps/api:/app
      - /app/tmp
    networks:
      - app-network
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    container_name: uptime-monitor-web
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - ./turbo.json:/app/turbo.json
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    networks:
      - app-network

  db:
    image: postgres:17-alpine
    container_name: uptime-monitor-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
