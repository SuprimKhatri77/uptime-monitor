version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/database/schema"
    queries: "internal/database/queries"
    gen:
      go:
        package: "db"
        out: "internal/database/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: snake
        overrides:
          - column: "users.password_hash"
            go_struct_tag: 'json:"-"'
